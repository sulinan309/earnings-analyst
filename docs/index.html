<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>港股财报分析工具</title>
<style>:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--text-muted:#484f58;--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--green-bg:rgba(63,185,80,.12);--red-bg:rgba(248,81,73,.12);--yellow-bg:rgba(210,153,34,.12);--blue-bg:rgba(88,166,255,.12)}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:-apple-system,"Noto Sans SC",sans-serif;line-height:1.6}a{color:var(--blue);text-decoration:none}.container{max-width:1080px;margin:0 auto;padding:32px 24px}.page-header{text-align:center;margin-bottom:40px}.page-header h1{font-size:32px;margin-bottom:8px}.page-header p{color:var(--text-dim);font-size:15px}.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-decoration:none!important;color:var(--text);transition:border-color .2s,transform .15s;display:flex;flex-direction:column;gap:12px}.stock-card:hover{border-color:var(--blue);transform:translateY(-2px)}.card-header{display:flex;align-items:center;gap:8px}.card-name{font-size:20px;font-weight:700}.card-ticker{color:var(--text-dim);font-size:14px}.tag{background:var(--blue-bg);color:var(--blue);padding:2px 10px;border-radius:12px;font-size:12px;margin-left:auto}.card-action{text-align:center;font-weight:700;font-size:15px;padding:6px;border-radius:8px}.action-heavy{background:var(--green-bg);color:var(--green)}.action-pass{background:var(--red-bg);color:var(--red)}.action-light{background:var(--yellow-bg);color:var(--yellow)}.footer{text-align:center;color:var(--text-muted);font-size:12px;margin-top:40px;padding-top:16px;border-top:1px solid var(--border)}</style></head>
<body><div class="container">
<div class="page-header"><h1>港股财报分析工具</h1><p>基于李录 Owner's Earnings 框架 · v4.3估值体系 · 2026年4月更新</p></div>

    </a><a href="0700_HK.html" class="stock-card">

        <div class="card-action action-pass">观察区</div>
    </a><a href="3690_HK.html" class="stock-card">
        <div class="card-header"><span class="card-name">美团</span><span class="card-ticker">3690.HK</span><span class="tag">顶级资产</span></div>
        <div class="card-action action-pass">观察区(暂时性战损)</div>
    </a><a href="9988_HK.html" class="stock-card">

<div class="footer">数据来源: 公司财报原文 &gt; 管理层业绩会 &gt; 第三方交叉验证<br>资金配置优先级: 快手(明确加仓) &gt; 腾讯(等回落) &gt; 美团(减仓) &gt; 阿里(占座) &gt; 小米(swing trade)</div>
</div></body></html>
